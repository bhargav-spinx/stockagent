name: Deploy to VM

# Auto-deploy on every push to main (and a manual button). Authenticates to
# Google Cloud, SSHes into the VM THROUGH IAP (no public IP / no port 22 open to
# the internet), fast-forwards the code, and runs deploy/deploy.sh
# (pip-install-if-changed -> restart stockbot -> health check).
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   GCP_SA_KEY    JSON key of a service account with the roles in deploy/README.md
#   VM_INSTANCE   instance name (e.g. stockbot)
#   VM_ZONE       instance zone (e.g. us-central1-a)
#   VM_USER       SSH/login user on the VM (e.g. ladanibhargav)
#   GCP_PROJECT   (optional) project id, if not inferable from the SA key
# See deploy/README.md for the one-time GCP setup.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at once; if a newer push arrives, cancel the in-flight one.
concurrency:
  group: vm-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT }}

      - name: Deploy via IAP SSH
        run: |-
          gcloud compute ssh "${{ secrets.VM_USER }}@${{ secrets.VM_INSTANCE }}" \
            --zone="${{ secrets.VM_ZONE }}" \
            --tunnel-through-iap \
            --quiet \
            --command='set -euo pipefail; cd ~/stockagent && git fetch origin main && git reset --hard origin/main && bash deploy/deploy.sh'
